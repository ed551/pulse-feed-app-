<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Pulse Feeds</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3940256099942544" crossorigin="anonymous"></script>
    <style>
      #boot-loader {
        position: fixed;
        inset: 0;
        background: #111827; /* gray-900 */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: system-ui, -apple-system, sans-serif;
        color: white;
      }
      .loader-spin {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top-color: #f97316; /* orange-500 */
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .boot-text { font-weight: 800; font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; }
      #boot-error {
        display: none;
        max-width: 80%;
        text-align: center;
        color: #fca5a5; /* red-300 */
        font-size: 12px;
        margin-top: 20px;
        padding: 20px;
        background: rgba(127, 29, 29, 0.4);
        border-radius: 12px;
        border: 1px solid rgba(239, 68, 68, 0.2);
      }
    </style>
  </head>
  <body>
    <div id="boot-loader">
      <div class="loader-spin"></div>
      <div class="boot-text">Pulse Feeds Initializing...</div>
      <div id="boot-error">
        <p>Something went wrong during initialization.</p>
        <p id="error-detail" style="font-family: monospace; opacity: 0.7; margin: 10px 0;"></p>
        <p>If you're on <b>Facebook</b> or <b>Instagram</b>, please tap the three dots or share icon and select <b>"Open in Browser"</b>.</p>
      </div>
    </div>
    <script>
      window.addEventListener('error', function(e) {
        var loader = document.getElementById('boot-loader');
        var errorDisplay = document.getElementById('boot-error');
        var detail = document.getElementById('error-detail');
        if (errorDisplay) errorDisplay.style.display = 'block';
        if (detail) detail.innerText = e.message;
        console.error('Boot Error:', e);
      });
      // Safety timeout
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && root.children.length === 0) {
           var errorDisplay = document.getElementById('boot-error');
           if (errorDisplay) {
             errorDisplay.style.display = 'block';
             document.getElementById('error-detail').innerText = 'Timed out waiting for app to bootstrap.';
           }
        }
      }, 10000);
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
