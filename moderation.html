<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📱 Supervybe - Moderation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

    <header>
        <img src="asset/logo.png" alt="Logo" class="logo" onerror="this.src='https://picsum.photos/seed/logo/40/40'">
        <div class="gold-indicator">Gold ⏭️</div>
        <div class="weather-clock">
            <div class="weather-icon">☀️</div>
            <div class="clock-date">
                <div>00:00</div>
                <div style="font-size: 0.6rem;">01/01/2026</div>
            </div>
        </div>
    </header>

    <div class="sidebar-links"></div>

    <div class="container">
        <div id="moderation-auth" class="card" style="text-align: center;">
            <h2 style="font-size: 1.2rem; margin-bottom: 20px;">🛡️ Admin Access Required</h2>
            <div class="fingerprint-reader" onclick="checkHealth()">
                <img src="asset/fingerprint_reader.png" alt="Fingerprint Reader" onerror="this.src='https://picsum.photos/seed/fingerprint/80/80'">
            </div>
            <p style="font-size: 0.8rem; color: #888; margin-top: 15px;">Scan fingerprint to unlock admin dashboard.</p>
        </div>

        <div id="admin-dashboard" class="card" style="display: none;">
            <h2 style="font-size: 1.2rem; margin-bottom: 20px;">🛡️ Admin Dashboard</h2>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px;">
                <div class="admin-switch" style="text-align: center; cursor: pointer;">
                    <img src="asset/kill.png" alt="Kill" style="width: 40px; height: 40px; margin-bottom: 5px; filter: drop-shadow(0 0 5px var(--neon-red));" onerror="this.src='https://picsum.photos/seed/kill/40/40'">
                    <div style="font-size: 0.6rem; color: var(--neon-red);">Kill</div>
                </div>
                <div class="admin-switch" style="text-align: center; cursor: pointer;">
                    <img src="asset/boot.png" alt="Boot" style="width: 40px; height: 40px; margin-bottom: 5px; filter: drop-shadow(0 0 5px var(--neon-green));" onerror="this.src='https://picsum.photos/seed/boot/40/40'">
                    <div style="font-size: 0.6rem; color: var(--neon-green);">Boot</div>
                </div>
                <div class="admin-switch" style="text-align: center; cursor: pointer;">
                    <img src="asset/restart.png" alt="Restart" style="width: 40px; height: 40px; margin-bottom: 5px; filter: drop-shadow(0 0 5px var(--neon-blue));" onerror="this.src='https://picsum.photos/seed/restart/40/40'">
                    <div style="font-size: 0.6rem; color: var(--neon-blue);">Restart</div>
                </div>
                <div class="admin-switch" style="text-align: center; cursor: pointer;">
                    <img src="asset/upgrade.png" alt="Upgrade" style="width: 40px; height: 40px; margin-bottom: 5px; filter: drop-shadow(0 0 5px gold);" onerror="this.src='https://picsum.photos/seed/upgrade/40/40'">
                    <div style="font-size: 0.6rem; color: gold;">Upgrade</div>
                </div>
                <div class="admin-switch" style="text-align: center; cursor: pointer;">
                    <img src="asset/problem-checker.png" alt="Check" style="width: 40px; height: 40px; margin-bottom: 5px; filter: drop-shadow(0 0 5px cyan);" onerror="this.src='https://picsum.photos/seed/check/40/40'">
                    <div style="font-size: 0.6rem; color: cyan;">Check</div>
                </div>
                <div class="admin-switch" style="text-align: center; cursor: pointer;">
                    <img src="asset/downgrade.png" alt="Downgrade" style="width: 40px; height: 40px; margin-bottom: 5px; filter: drop-shadow(0 0 5px orange);" onerror="this.src='https://picsum.photos/seed/downgrade/40/40'">
                    <div style="font-size: 0.6rem; color: orange;">Downgrade</div>
                </div>
            </div>

            <div class="card" style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);">
                <h3 style="font-size: 0.9rem; margin-bottom: 10px;">🚩 Flagged Reports</h3>
                <div style="font-size: 0.8rem; color: #888;">No pending reports. System clean.</div>
            </div>
        </div>
    </div>

    <div class="ai-master">🧠</div>
    <div class="fab">➕</div>

    <nav class="bottom-nav"></nav>

    <script src="script.js"></script>
    <script src="moderation.js"></script>
    <script>
        // Simulation for admin unlock
        const reader = document.querySelector('.fingerprint-reader');
        if (reader) {
            reader.addEventListener('click', () => {
                setTimeout(() => {
                    document.getElementById('moderation-auth').style.display = 'none';
                    document.getElementById('admin-dashboard').style.display = 'block';
                }, 1000);
            });
        }
    </script>
</body>
</html>
