<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📱 Supervybe - Support</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

    <header>
        <img src="asset/logo.png" alt="Logo" class="logo" onerror="this.src='https://picsum.photos/seed/logo/40/40'">
        <div class="gold-indicator">Gold ⏭️</div>
        <div class="weather-clock">
            <div class="weather-icon">☀️</div>
            <div class="clock-date">
                <div>00:00</div>
                <div style="font-size: 0.6rem;">01/01/2026</div>
            </div>
        </div>
    </header>

    <div class="sidebar-links"></div>

    <div class="container">
        <div class="card">
            <h2 style="font-size: 1.2rem; margin-bottom: 20px;">🎧 Customer Support</h2>
            <p style="font-size: 0.85rem; color: #888; margin-bottom: 20px;">Need help? Our support team is available 24/7 to assist you.</p>
            <a href="asset/support.pdf" target="_blank" style="display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); border: 1px solid #444; padding: 15px; border-radius: 10px; color: white; text-decoration: none; margin-bottom: 15px;">
                <span style="font-size: 1.5rem;">📄</span>
                <div>
                    <div style="font-weight: bold; font-size: 0.9rem;">Support Guide.pdf</div>
                    <div style="font-size: 0.7rem; color: #888;">Download or View PDF</div>
                </div>
            </a>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button style="width: 100%; background: #b026ff; border: none; padding: 12px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer;">Live Chat with AI</button>
                <button style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #444; padding: 12px; border-radius: 10px; color: white; cursor: pointer;">Email Support</button>
            </div>
            <div style="margin-top: 25px; font-size: 0.8rem; color: #888; line-height: 1.5;">
                <p>For urgent issues, please use the live chat feature. Our AI assistant can resolve most common problems instantly.</p>
            </div>
        </div>
    </div>

    <div class="ai-master">🧠</div>
    <div class="fab">➕</div>

    <nav class="bottom-nav"></nav>

    <script src="script.js"></script>
    <script src="support.js"></script>
</body>
</html>
