<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passkey Auth Demo</title>
    <script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md space-y-8 glass p-8 rounded-3xl shadow-2xl">
        <div class="text-center">
            <h1 class="text-4xl font-extrabold tracking-tighter mb-2 bg-gradient-to-r from-orange-400 to-rose-500 bg-clip-text text-transparent">PASSKEY AUTH</h1>
            <p class="text-gray-400 text-sm">Standalone FIDO2 Implementation</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Username</label>
                <input id="username" type="text" placeholder="johndoe" 
                    class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-orange-500 transition-all">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="register()" 
                    class="bg-white text-black font-bold py-3 rounded-xl hover:bg-gray-200 transition-all flex items-center justify-center gap-2">
                    Register
                </button>
                <button onclick="login()" 
                    class="bg-orange-600 text-white font-bold py-3 rounded-xl hover:bg-orange-700 transition-all flex items-center justify-center gap-2">
                    Login
                </button>
            </div>
        </div>

        <div id="status" class="mt-6 p-4 rounded-xl text-xs font-mono text-center hidden"></div>

        <div class="pt-6 border-t border-white/10 text-center">
            <p class="text-[10px] text-gray-600 uppercase tracking-widest font-bold">Powered by SimpleWebAuthn</p>
        </div>
    </div>

    <script>
        const { startRegistration, startAuthentication } = SimpleWebAuthnBrowser;

        function showStatus(msg, isError = false) {
            const el = document.getElementById('status');
            el.innerText = msg;
            el.className = `mt-6 p-4 rounded-xl text-xs font-mono text-center block ${isError ? 'bg-red-500/10 text-red-500 border border-red-500/20' : 'bg-green-500/10 text-green-500 border border-green-500/20'}`;
        }

        async function register() {
            const username = document.getElementById('username').value;
            if (!username) return alert('Username required');

            try {
                // 1. Get options from server
                const resp = await fetch('/api/auth/register-options', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                const options = await resp.json();

                // 2. Browser handles WebAuthn
                const attResp = await startRegistration({ optionsJSON: options });

                // 3. Verify on server
                const verResp = await fetch('/api/auth/register-verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, body: attResp })
                });
                const verification = await verResp.json();

                if (verification.verified) {
                    showStatus('Registration successful!');
                } else {
                    showStatus('Registration failed', true);
                }
            } catch (err) {
                console.error(err);
                showStatus(err.message, true);
            }
        }

        async function login() {
            const username = document.getElementById('username').value;
            if (!username) return alert('Username required');

            try {
                // 1. Get options from server
                const resp = await fetch('/api/auth/login-options', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                const options = await resp.json();

                // 2. Browser handles WebAuthn
                const asseResp = await startAuthentication({ optionsJSON: options });

                // 3. Verify on server
                const verResp = await fetch('/api/auth/login-verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, body: asseResp })
                });
                const verification = await verResp.json();

                if (verification.verified) {
                    showStatus('Authenticated successfully!');
                } else {
                    showStatus('Authentication failed', true);
                }
            } catch (err) {
                console.error(err);
                showStatus(err.message, true);
            }
        }
    </script>
</body>
</html>
