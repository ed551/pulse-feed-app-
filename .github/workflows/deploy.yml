name: Pulse Feeds Frontend CI/CD

# This tells the robot to wake up whenever new code is pushed to 'main'
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. The robot downloads your latest code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. The robot sets up its own internal Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. The robot installs the Vite/React tools (just like you did in Termux)
      - name: Install Dependencies
        run: npm install

      # 4. The robot compiles your raw code into the browser-ready 'dist' folder
      - name: Build the Production App
        run: npm run build

      # 5. The robot securely logs into Surge and blasts the site live!
      - name: Deploy to Surge
        run: npx surge ./dist pulse-feeds.surge.sh --token ${{ secrets.SURGE_TOKEN }}
