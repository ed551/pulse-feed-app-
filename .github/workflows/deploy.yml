name: Pulse Feeds Self-Checking Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps
          npm install @tailwindcss/oxide-linux-x64-gnu --legacy-peer-deps

      - name: Run Linter
        run: npm run lint

      - name: Build the Production App
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_API_RELAY_URL: ${{ secrets.VITE_API_RELAY_URL }}

      - name: Deploy to Surge
        run: npx surge ./dist pulse-feeds.surge.sh --token ${{ secrets.SURGE_TOKEN }}
