<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📱 Pulse Feeds - Notifications</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

    <div class="app-container" id="app">
        <header>
            <img src="asset/logo.png" alt="Logo" class="logo" onerror="this.src='https://picsum.photos/seed/logo/40/40'">
            <div class="gold-indicator">Gold ⏭️</div>
            <div class="weather-clock">
                <div class="weather-icon">☀️</div>
                <div class="clock-date">
                    <div>00:00</div>
                    <div style="font-size: 0.6rem;">01/01/2026</div>
                </div>
            </div>
        </header>

        <div class="main-content">
            <div class="sidebar-links"></div>

            <div class="container">
                <div class="card">
                    <h2 style="font-size: 1.2rem; margin-bottom: 20px;">🔔 Notifications</h2>
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div style="font-weight: bold; font-size: 0.9rem;">Replies & Mentions</div>
                                <div style="font-size: 0.75rem; color: #888;">When someone replies to your post.</div>
                            </div>
                            <input type="checkbox" checked style="width: 20px; height: 20px; accent-color: #b026ff;">
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div style="font-weight: bold; font-size: 0.9rem;">Group Updates</div>
                                <div style="font-size: 0.75rem; color: #888;">New posts in your joined groups.</div>
                            </div>
                            <input type="checkbox" checked style="width: 20px; height: 20px; accent-color: #b026ff;">
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div style="font-weight: bold; font-size: 0.9rem;">Reward Alerts</div>
                                <div style="font-size: 0.75rem; color: #888;">When you earn new credits.</div>
                            </div>
                            <input type="checkbox" checked style="width: 20px; height: 20px; accent-color: #b026ff;">
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div style="font-weight: bold; font-size: 0.9rem;">Priority Alerts</div>
                                <div style="font-size: 0.75rem; color: #ffd700;">VIP mentions and event reminders.</div>
                            </div>
                            <input type="checkbox" style="width: 20px; height: 20px; accent-color: #ffd700;">
                        </div>
                    </div>
                    <button style="width: 100%; background: #b026ff; border: none; padding: 12px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 25px;">Save Preferences</button>
                </div>
            </div>
        </div>

        <div class="ai-master">🧠</div>
        <div class="fab">➕</div>

        <nav class="bottom-nav"></nav>
    </div>

    <script src="script.js"></script>
    <script src="notifications.js"></script>
</body>
</html>
