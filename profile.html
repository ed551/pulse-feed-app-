<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📱 Pulse Feeds - Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

    <header>
        <img src="asset/logo.png" alt="Logo" class="logo" onerror="this.src='https://picsum.photos/seed/logo/40/40'">
        <div class="gold-indicator">Gold ⏭️</div>
        <div class="weather-clock">
            <div class="weather-icon">☀️</div>
            <div class="clock-date">
                <div>00:00</div>
                <div style="font-size: 0.6rem;">01/01/2026</div>
            </div>
        </div>
    </header>

    <div class="sidebar-links"></div>

    <div class="container">
        <div class="card" style="text-align: center;">
            <div style="width: 100px; height: 100px; border-radius: 50%; background: var(--primary-gradient); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 3rem; box-shadow: 0 0 20px rgba(118, 75, 162, 0.5);">👤</div>
            <h2 style="font-size: 1.5rem; font-weight: 900; margin-bottom: 5px;">Super User</h2>
            <p style="font-size: 0.85rem; color: #888; margin-bottom: 15px;">Digital Creator & Tech Enthusiast</p>
            <div style="display: flex; justify-content: space-around; font-size: 0.8rem;">
                <div>
                    <div style="font-weight: bold; font-size: 1.1rem;">1.2k</div>
                    <div style="opacity: 0.6;">Posts</div>
                </div>
                <div>
                    <div style="font-weight: bold; font-size: 1.1rem;">4.5k</div>
                    <div style="opacity: 0.6;">Followers</div>
                </div>
                <div>
                    <div style="font-weight: bold; font-size: 1.1rem;">850</div>
                    <div style="opacity: 0.6;">Following</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="font-size: 1.1rem; margin-bottom: 15px;">⚙️ Settings</h2>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #444; padding: 12px; border-radius: 10px; color: white; text-align: left; cursor: pointer;">Account Settings</button>
                <button style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #444; padding: 12px; border-radius: 10px; color: white; text-align: left; cursor: pointer;">Privacy Preferences</button>
                <button style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #444; padding: 12px; border-radius: 10px; color: white; text-align: left; cursor: pointer;">Notification Settings</button>
                <button style="width: 100%; background: #ff3131; border: none; padding: 12px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px;">Sign Out</button>
            </div>
        </div>
    </div>

    <div class="ai-master">🧠</div>
    <div class="fab">➕</div>

    <nav class="bottom-nav"></nav>

    <script src="script.js"></script>
    <script src="profile.js"></script>
</body>
</html>
