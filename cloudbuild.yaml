steps:
  # Install dependencies
  - name: 'node:20'
    entrypoint: npm
    args: ['install']

  # Build the application
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        'pulse-feeds',
        '--image',
        'europe-west2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/pulse-feeds:$COMMIT_SHA',
        '--region',
        'europe-west2',
        '--platform',
        'managed',
        '--allow-unauthenticated',
        '--source',
        '.'
      ]

timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY
