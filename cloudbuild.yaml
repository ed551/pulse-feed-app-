steps:
  # Build the application
  - name: 'node:20'
    entrypoint: npm
    args: ['install']

  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']

  # Build and Push Container using Docker directly to avoid variable resolution issues
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'europe-west2-docker.pkg.dev/consumer-rewards-app-2026/cloud-run-source-deploy/pulse-feeds/pulse-feeds:$COMMIT_SHA',
        '.'
      ]

  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        'europe-west2-docker.pkg.dev/consumer-rewards-app-2026/cloud-run-source-deploy/pulse-feeds/pulse-feeds:$COMMIT_SHA'
      ]

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        'pulse-feeds',
        '--image',
        'europe-west2-docker.pkg.dev/consumer-rewards-app-2026/cloud-run-source-deploy/pulse-feeds/pulse-feeds:$COMMIT_SHA',
        '--region',
        'europe-west2',
        '--platform',
        'managed',
        '--allow-unauthenticated'
      ]

timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY
