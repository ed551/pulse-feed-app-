<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📱 Pulse Feeds - Rewards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

    <div class="app-container" id="app">
        <header>
            <img src="asset/logo.png" alt="Logo" class="logo" onerror="this.src='https://picsum.photos/seed/logo/40/40'">
            <div class="gold-indicator">Gold ⏭️</div>
            <div class="weather-clock">
                <div class="weather-icon">☀️</div>
                <div class="clock-date">
                    <div>00:00</div>
                    <div style="font-size: 0.6rem;">01/01/2026</div>
                </div>
            </div>
        </header>

        <div class="main-content">
            <div class="sidebar-links"></div>

            <div class="container">
                <div class="card" style="text-align: center; background: linear-gradient(135deg, #ffd700 0%, #ff9f43 100%); color: black;">
                    <div style="font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;">My Reward Credits</div>
                    <div style="font-size: 2.5rem; font-weight: 900;">524.50</div>
                    <div style="font-size: 0.7rem; opacity: 0.8;">Points earned through participation.</div>
                </div>

                <div class="card">
                    <h2 style="font-size: 1.1rem; margin-bottom: 15px;">💎 Badge Showcase</h2>
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
                        <div style="text-align: center; font-size: 1.5rem; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 10px;">🥇</div>
                        <div style="text-align: center; font-size: 1.5rem; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 10px;">🔥</div>
                        <div style="text-align: center; font-size: 1.5rem; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 10px;">🚀</div>
                        <div style="text-align: center; font-size: 1.5rem; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 10px; opacity: 0.3;">🔒</div>
                    </div>
                </div>

                <div class="card">
                    <h2 style="font-size: 1.1rem; margin-bottom: 10px;">📊 Reward Distribution</h2>
                    <p style="font-size: 0.85rem; color: #888; margin-bottom: 15px;">Users receive 50% of reward credits, developers retain 50% to sustain the platform.</p>
                    <div style="width: 100%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; display: flex;">
                        <div style="width: 50%; height: 100%; background: #ffd700;"></div>
                        <div style="width: 50%; height: 100%; background: #b026ff;"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.7rem; margin-top: 5px;">
                        <span>User (50%)</span>
                        <span>Platform (50%)</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="ai-master">🧠</div>
        <div class="fab">➕</div>

        <nav class="bottom-nav"></nav>
    </div>

    <script src="script.js"></script>
    <script src="rewards.js"></script>
</body>
</html>
