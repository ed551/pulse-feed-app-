<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calls - Pulse Feeds</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .calls-container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .call-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .call-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .call-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #333;
            object-fit: cover;
        }
        .call-details h3 {
            margin: 0;
            font-size: 1rem;
        }
        .call-details p {
            margin: 0;
            font-size: 0.8rem;
            opacity: 0.6;
        }
        .call-actions {
            display: flex;
            gap: 10px;
        }
        .call-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #00d2ff;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            font-size: 0.9rem;
        }
        .tab.active {
            background: #00d2ff;
            color: #000;
        }
        .search-bar {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">P</div>
            <div class="header-center">
                <div class="weather-pill">
                    <div class="weather-icon">☀️</div>
                    <span class="temp-display">+32°C</span>
                </div>
                <div class="clock-pill">
                    <div class="clock-date">
                        <div>12:00</div>
                        <div style="font-size: 0.6rem; opacity: 0.7;">30/03/2026</div>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" title="Support">🎧</button>
                <button class="icon-btn" title="Calls">📞</button>
            </div>
        </header>

        <main class="content">
            <div class="calls-container">
                <h2 class="section-title">Calls</h2>
                <div class="tabs">
                    <div class="tab active">All</div>
                    <div class="tab">Missed</div>
                </div>
                <input type="text" class="search-bar" placeholder="Search contacts or groups...">
                
                <div class="call-list">
                    <div class="call-item">
                        <div class="call-info">
                            <img src="https://picsum.photos/seed/john/100" class="call-avatar" alt="John">
                            <div class="call-details">
                                <h3>John Doe</h3>
                                <p>Incoming • 10:30 AM</p>
                            </div>
                        </div>
                        <div class="call-actions">
                            <button class="call-btn">📞</button>
                            <button class="call-btn">📹</button>
                        </div>
                    </div>
                    <div class="call-item">
                        <div class="call-info">
                            <img src="https://picsum.photos/seed/team/100" class="call-avatar" alt="Team">
                            <div class="call-details">
                                <h3>Design Team</h3>
                                <p>Group • Yesterday</p>
                            </div>
                        </div>
                        <div class="call-actions">
                            <button class="call-btn">📞</button>
                            <button class="call-btn">📹</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav"></nav>
        <aside class="sidebar-links"></aside>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize static elements
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof updateClock === 'function') updateClock();
            if (typeof setupNavigation === 'function') setupNavigation();
            if (typeof setupSidebar === 'function') setupSidebar();
        });
    </script>
</body>
</html>
